name: Publish macOS release

on:
  push:
    branches:
      - main
    paths:
      - latest.json
      - RELEASE_NOTES.md
      - release-assets/payroll-calculator.dmg
      - .github/workflows/publish-release.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release and upload DMG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(jq -r '.version' latest.json)"
          TAG_NAME="v$VERSION"
          gh release create "$TAG_NAME" \
            "release-assets/payroll-calculator.dmg#payroll-calculator.dmg" \
            --title "월급계산기 $TAG_NAME" \
            --notes-file RELEASE_NOTES.md
